<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Regiment — Share a Battle</title>
  <meta name="description" content="Share a Regiment battle — a living memorial to the Indian Army." />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Regiment" />
  <meta id="og-title" property="og:title" content="Regiment — India's Finest Hours" />
  <meta id="og-desc" property="og:description" content="Thirteen real battles. Named soldiers. Play, watch, or remember." />
  <meta name="twitter:card" content="summary" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080810;
      --bg-card: #0d0d1a;
      --gold: #c8a96e;
      --gold-dim: #8a7050;
      --text: #d4d0c8;
      --muted: #7a7870;
      --border: #1e1e2e;
      --font-mono: 'Courier New', Courier, monospace;
      --font-body: Georgia, 'Times New Roman', serif;
    }
    body {
      min-height: 100vh;
      background: radial-gradient(ellipse 70% 50% at 50% 20%, #1a1a0a 0%, var(--bg) 70%);
      color: var(--text);
      font-family: var(--font-body);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
    }
    .card {
      width: min(520px, 100%);
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 2.5rem 2rem;
      text-align: center;
    }
    .label {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold-dim);
      margin-bottom: 1.5rem;
    }
    .title {
      font-family: var(--font-mono);
      font-size: clamp(22px, 5vw, 32px);
      letter-spacing: 0.12em;
      color: var(--gold);
      margin-bottom: 0.5rem;
    }
    .regiment {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.15em;
      color: var(--muted);
      margin-bottom: 1.25rem;
    }
    .quote {
      font-style: italic;
      color: var(--muted);
      line-height: 1.8;
      margin-bottom: 2rem;
      font-size: 15px;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      justify-content: center;
    }
    .btn {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      padding: 12px 22px;
      border: 1px solid var(--gold);
      background: var(--gold);
      color: var(--bg);
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, color 0.2s;
    }
    .btn:hover { background: transparent; color: var(--gold); }
    .btn-ghost {
      background: transparent;
      color: var(--gold);
      border-color: var(--gold-dim);
    }
    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(120%);
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      border: 1px solid var(--gold-dim);
      background: var(--bg-card);
      padding: 10px 16px;
      opacity: 0;
      transition: transform 0.25s, opacity 0.25s;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
    .fallback { color: var(--muted); font-size: 14px; line-height: 1.7; }
    .fallback a { color: var(--gold); }
  </style>
</head>
<body>
  <div class="card" id="card">
    <p class="label">Regiment · Share</p>
    <div id="content">
      <p class="fallback">Loading battle…</p>
    </div>
  </div>
  <div class="toast" id="toast">Link copied</div>

  <script type="module">
    import { BATTLES } from './battles/index.js';
    import { DEBRIEF_DATA } from './battles/debrief-data.js';

    const params = new URLSearchParams(location.search);
    const battleName = params.get('battle') || params.get('b');
    const battle = BATTLES.find(b => b.name === battleName);
    const debrief = battle ? DEBRIEF_DATA[battle.name] : null;
    const content = document.getElementById('content');

    const base = location.pathname.includes('/game/') ? '/game' : '';

    const playUrl = battle
      ? `${location.origin}${base}/index.html?battle=${encodeURIComponent(battle.name)}`
      : './index.html';

    const shareUrl = battle
      ? `${location.origin}${base}/share.html?battle=${encodeURIComponent(battle.name)}`
      : location.href;

    if (battle) {
      const hero = debrief?.hero;
      const title = `${battle.name} · ${battle.year}`;
      const desc = battle.sub;
      document.title = `Regiment — ${title}`;
      document.getElementById('og-title').content = `Regiment — ${title}`;
      document.getElementById('og-desc').content = desc;

      content.innerHTML = `
        <h1 class="title">${battle.name}</h1>
        <p class="regiment">${battle.regiment} · ${battle.year}</p>
        <p class="quote">${hero?.quote ? `"${hero.quote}"` : `"${battle.sub}"`}</p>
        <div class="actions">
          <a class="btn" href="${playUrl}">Play this battle →</a>
          <button class="btn btn-ghost" type="button" id="copy-btn">Copy link</button>
          <button class="btn btn-ghost" type="button" id="native-share" hidden>Share</button>
        </div>
      `;
    } else {
      content.innerHTML = `
        <h1 class="title">REGIMENT</h1>
        <p class="regiment">India's Finest Hours</p>
        <p class="quote">Thirteen real battles. Named soldiers. A living memorial to the Indian Army.</p>
        <div class="actions">
          <a class="btn" href="./landing.html">Explore →</a>
          <a class="btn btn-ghost" href="./index.html">Play</a>
        </div>
        <p class="fallback" style="margin-top:1.5rem;font-size:12px;">
          Add <code>?battle=Tololing</code> to share a specific battle.
        </p>
      `;
    }

    const toast = document.getElementById('toast');
    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2200);
    }

    document.getElementById('copy-btn')?.addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(shareUrl);
        showToast('Link copied');
      } catch {
        showToast('Copy failed');
      }
    });

    const nativeBtn = document.getElementById('native-share');
    if (nativeBtn && navigator.share && battle) {
      nativeBtn.hidden = false;
      nativeBtn.addEventListener('click', () => {
        navigator.share({
          title: `Regiment — ${battle.name}`,
          text: battle.sub,
          url: shareUrl,
        }).catch(() => {});
      });
    }
  </script>
</body>
</html>
